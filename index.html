  <head>
    <meta charset="UTF-8" />

    <!-- ── Primary SEO ──────────────────────────────────────────── -->
    <title>Kraviq — Forex Trading OS for Prop &amp; Manual Traders</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Kraviq",
      "applicationCategory": "FinanceApplication",

      "description": "Kraviq is the operating system for serious retail forex traders. Track every trade, manage prop firm challenges, analyze performance, and score your trading business.",
      "url": "https://kraviq.app",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "1 trading account, up to 50 trades per month, basic analytics"
        },
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "12",
          "priceCurrency": "USD",
          "description": "3 trading accounts, unlimited trades, full analytics, Business Score"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "29",
          "priceCurrency": "USD",
          "description": "10 accounts, EA sync, War Account system, prop firm challenge tracker"
        },
        {
          "@type": "Offer",
          "name": "Elite",
          "price": "49",
          "priceCurrency": "USD",
          "description": "Unlimited accounts, API access, AI coaching insights, dedicated onboarding"
        }
      ],
      "featureList": [
        "Prop firm challenge tracking",
        "MT4 and MT5 EA auto-sync",
        "Trading Business Score 0-100",
        "CSV trade history import",
        "War Account sandbox",
        "True net P&L calculation",
        "Behavioural pattern detection",
        "Multi-account management"
      ],
      "screenshot": "https://kraviq.app/og-image.png"
    }
    </script>

    <!-- ── Structured Data: Organization ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kraviq",
      "url": "https://kraviq.app",
      "logo": "https://kraviq.app/og-image.png",
      "description": "The operating system for retail forex traders",
      "foundingDate": "2026",
      "sameAs": []
    }
    </script>

    <!-- ── Structured Data: FAQPage ──────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Kraviq free to start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Free plan gives you 1 trading account, up to 50 trades per month, manual entry, and basic analytics — no credit card required. You can upgrade when you're ready."
          }
        },
        {
          "@type": "Question",
          "name": "Does Kraviq work with MetaTrader 4 and MT5?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Kraviq supports MT4 and MT5 via three methods: manual trade entry, CSV export/import from your broker terminal, and automatic EA sync through the Kraviq Expert Advisor you install on your chart."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Business Score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Trading Business Score is a 0–100 composite metric unique to Kraviq. It measures five pillars — consistency, risk management, profitability, discipline, and growth — and gives you a single number that reflects your overall trading business health. It updates weekly and requires at least 10 closed trades."
          }
        },
        {
          "@type": "Question",
          "name": "What is a War Account and why would I use one?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A War Account is an isolated sandbox for testing experimental or high-risk strategies. It allows full margin, news trading, and scalping. War Account data is completely excluded from your aggregate performance metrics and Business Score — so your experiments don't contaminate your real numbers."
          }
        },
        {
          "@type": "Question",
          "name": "Can I import my existing MT4/MT5 trade history?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Export a Statement from your MetaTrader terminal, upload it to Kraviq, and we'll auto-detect your broker format. You'll see a preview before confirming the import. We support all major broker statement formats."
          }
        },
        {
          "@type": "Question",
          "name": "Does Kraviq support prop firm accounts like FTMO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Prop accounts in Kraviq track your challenge rules in real time — profit target, daily and overall drawdown limits, minimum trading days, and payout eligibility. We support FTMO, FundingPips, The Funded Trader, and more."
          }
        },
        {
          "@type": "Question",
          "name": "How does EA sync work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Install the Kraviq Expert Advisor (EA) on your MT4/MT5 chart and configure it with your unique API key. Every time a trade closes, the EA automatically syncs the trade details to Kraviq — no manual input required."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my subscription at any time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. There are no lock-in periods. Cancel from your Settings page at any time. If you cancel, you'll retain access until the end of your current billing period. Your data is preserved — you can re-subscribe and pick up where you left off."
          }
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
